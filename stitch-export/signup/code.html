<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up - RankersKit</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-primary": "#005bc1",
                      "surface-variant": "#333539",
                      "error": "#ffb4ab",
                      "surface-dim": "#111318",
                      "on-secondary-container": "#ddb7ff",
                      "tertiary-fixed": "#ffdcc3",
                      "on-primary-fixed": "#001a41",
                      "on-surface-variant": "#c1c6d7",
                      "on-tertiary-fixed-variant": "#6e3900",
                      "primary-fixed": "#d8e2ff",
                      "background": "#111318",
                      "primary-fixed-dim": "#adc6ff",
                      "tertiary-fixed-dim": "#ffb77d",
                      "on-secondary-fixed-variant": "#6900b3",
                      "on-tertiary-container": "#432100",
                      "outline-variant": "#414755",
                      "surface-container-highest": "#333539",
                      "on-error": "#690005",
                      "primary-container": "#4b8eff",
                      "secondary-container": "#7900cd",
                      "on-tertiary": "#4d2600",
                      "surface-container-lowest": "#0c0e12",
                      "primary": "#adc6ff",
                      "surface-container-low": "#1a1c20",
                      "on-primary": "#002e69",
                      "inverse-on-surface": "#2f3035",
                      "on-tertiary-fixed": "#2f1500",
                      "on-primary-container": "#00285c",
                      "on-error-container": "#ffdad6",
                      "surface-tint": "#adc6ff",
                      "secondary-fixed-dim": "#ddb7ff",
                      "secondary-fixed": "#f0dbff",
                      "tertiary": "#ffb77d",
                      "on-surface": "#e2e2e8",
                      "error-container": "#93000a",
                      "on-primary-fixed-variant": "#004493",
                      "on-background": "#e2e2e8",
                      "secondary": "#ddb7ff",
                      "tertiary-container": "#cf7d30",
                      "on-secondary-fixed": "#2c0050",
                      "on-secondary": "#4a0080",
                      "outline": "#8b90a0",
                      "inverse-surface": "#e2e2e8",
                      "surface-container-high": "#282a2e",
                      "surface-container": "#1e2024",
                      "surface": "#111318",
                      "surface-bright": "#37393e"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xl": "80px",
                      "xs": "4px",
                      "sm": "12px",
                      "lg": "48px",
                      "container-max": "1200px",
                      "base": "8px",
                      "md": "24px",
                      "gutter": "24px"
              },
              "fontFamily": {
                      "h1": ["Inter"],
                      "body-md": ["Inter"],
                      "h2": ["Inter"],
                      "body-lg": ["Inter"],
                      "display": ["Inter"],
                      "label-caps": ["Inter"]
              },
              "fontSize": {
                      "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                      "h2": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                      "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                      "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "600"}]
              }
            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center overflow-x-hidden selection:bg-inverse-primary selection:text-white">
<!-- Luminescent Background Depth -->
<div class="fixed inset-0 z-0 pointer-events-none flex items-center justify-center opacity-70">
<div class="absolute w-[80vw] h-[80vw] max-w-[800px] max-h-[800px] bg-secondary-container/20 rounded-full blur-[100px] top-[-20%] right-[-10%] mix-blend-screen"></div>
<div class="absolute w-[60vw] h-[60vw] max-w-[600px] max-h-[600px] bg-inverse-primary/10 rounded-full blur-[80px] bottom-[-20%] left-[-10%] mix-blend-screen"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-[440px] p-gutter">
<!-- Glassmorphic Card -->
<div class="relative bg-surface-container/60 backdrop-blur-[20px] rounded-xl border border-white/5 border-t-white/10 border-l-white/10 p-md md:p-lg shadow-2xl overflow-hidden group">
<!-- Inner ambient glow -->
<div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent opacity-50 pointer-events-none"></div>
<!-- Header Section -->
<div class="relative z-10 flex flex-col items-center mb-lg">
<div class="w-[56px] h-[56px] rounded-lg bg-surface-container-highest border border-white/5 flex items-center justify-center mb-sm shadow-inner">
<span class="material-symbols-outlined text-inverse-primary text-[28px]">rocket_launch</span>
</div>
<h1 class="font-h2 text-h2 text-on-surface text-center mb-xs">Join RankersKit</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center">For the elite 1%.</p>
</div>
<!-- Form Section -->
<form class="relative z-10 flex flex-col gap-md">
<!-- Input Group: Full Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1" for="fullName">Full Name</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest text-on-surface font-body-md text-body-md border-b border-surface-variant rounded-t-DEFAULT px-4 py-3 outline-none focus:border-inverse-primary transition-colors placeholder:text-on-surface-variant/40 peer" id="fullName" placeholder="John Doe" required="true" type="text"/>
<!-- Focus Glow -->
<div class="absolute bottom-0 left-0 w-full h-[2px] bg-inverse-primary opacity-0 peer-focus:opacity-100 peer-focus:shadow-[0_0_8px_rgba(0,91,193,0.8)] transition-all duration-300 pointer-events-none"></div>
</div>
</div>
<!-- Input Group: Email -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest text-on-surface font-body-md text-body-md border-b border-surface-variant rounded-t-DEFAULT px-4 py-3 outline-none focus:border-inverse-primary transition-colors placeholder:text-on-surface-variant/40 peer" id="email" placeholder="name@example.com" required="true" type="email"/>
<div class="absolute bottom-0 left-0 w-full h-[2px] bg-inverse-primary opacity-0 peer-focus:opacity-100 peer-focus:shadow-[0_0_8px_rgba(0,91,193,0.8)] transition-all duration-300 pointer-events-none"></div>
</div>
</div>
<!-- Input Group: Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest text-on-surface font-body-md text-body-md border-b border-surface-variant rounded-t-DEFAULT px-4 py-3 outline-none focus:border-inverse-primary transition-colors placeholder:text-on-surface-variant/40 peer" id="password" placeholder="••••••••" required="true" type="password"/>
<div class="absolute bottom-0 left-0 w-full h-[2px] bg-inverse-primary opacity-0 peer-focus:opacity-100 peer-focus:shadow-[0_0_8px_rgba(0,91,193,0.8)] transition-all duration-300 pointer-events-none"></div>
</div><div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1" for="phone">Phone Number (Optional)</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest text-on-surface font-body-md text-body-md border-b border-surface-variant rounded-t-DEFAULT px-4 py-3 outline-none focus:border-inverse-primary transition-colors placeholder:text-on-surface-variant/40 peer" id="phone" placeholder="+91 00000 00000" type="tel"/>
<div class="absolute bottom-0 left-0 w-full h-[2px] bg-inverse-primary opacity-0 peer-focus:opacity-100 peer-focus:shadow-[0_0_8px_rgba(0,91,193,0.8)] transition-all duration-300 pointer-events-none"></div>
</div><div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1" for="preparingFor">Preparing For?</label>
<div class="relative">
<select class="w-full bg-surface-container-lowest text-on-surface font-body-md text-body-md border-b border-surface-variant rounded-t-DEFAULT px-4 py-3 outline-none focus:border-inverse-primary transition-colors appearance-none peer cursor-pointer" id="preparingFor">
<option disabled="" selected="" value="">Select your exam</option>
<option class="bg-surface-container text-on-surface" value="jee-mains">JEE Mains</option>
<option class="bg-surface-container text-on-surface" value="jee-advance">JEE Advance</option>
<option class="bg-surface-container text-on-surface" value="neet">NEET</option>
<option class="bg-surface-container text-on-surface" value="others">Others</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
<div class="absolute bottom-0 left-0 w-full h-[2px] bg-inverse-primary opacity-0 peer-focus:opacity-100 peer-focus:shadow-[0_0_8px_rgba(0,91,193,0.8)] transition-all duration-300 pointer-events-none"></div>
</div>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="mt-sm relative w-full bg-inverse-primary text-white font-body-lg text-body-lg font-semibold py-3 px-6 rounded-DEFAULT flex items-center justify-center gap-2 overflow-hidden hover:shadow-[0_0_20px_rgba(0,91,193,0.5)] transition-all duration-300 group" type="button">
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent pointer-events-none"></div>
<div class="absolute inset-0 bg-white/0 group-hover:bg-white/10 transition-colors duration-300 pointer-events-none"></div>
<span class="relative z-10">Start Practicing</span>
<span class="material-symbols-outlined relative z-10 text-[20px] group-hover:translate-x-1 transition-transform duration-300">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="relative z-10 mt-lg text-center">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-inverse-primary transition-colors duration-200" href="#">
                    Already have an account? Log in
                </a>
</div>
</div>
</main>
</body></html>
