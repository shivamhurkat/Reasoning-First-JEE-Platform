    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-md relative overflow-hidden font-body-md">
<!-- Decorative Background Texture -->
<img aria-hidden="true" class="absolute inset-0 w-full h-full object-cover opacity-[0.03] mix-blend-overlay pointer-events-none" data-alt="Abstract dark minimalist gradient flowing with deep violet and navy hues, subtle grain texture, high-end tech aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDP-G3ic52fe5EClNYQomqjV6fp-Z556C6hEALoEiAMPj8XQTw65FOtvREuqo_AYdQRAEoZ_Ybu5ytbEYJiSde8Y3hDtS469e2uOC6on1Fm1lw4vuATe24na28MzDZDNC42AtGVbm0e1Zqh_a0YXvLPKGnkezBaGUafZhhryRKN9rqhLl5T9lkgO3hyfvQ0nC2MJIeZhdFYVYgSfLvvGYr_yFt_ht6RoPk9Pw0Hy76ffV5_y8TxnbUOrs4EFtMvkx1fax09K7PvhjSz"/>
<!-- Luminescent Depth Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-secondary-container/20 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Login Canvas (Glassmorphic) -->
<main class="relative z-10 w-full max-w-[440px] bg-surface-container-lowest/60 backdrop-blur-xl border-t border-l border-white/5 rounded-xl p-lg shadow-2xl flex flex-col gap-lg">
<!-- Header -->
<header class="flex flex-col items-center text-center gap-xs">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center mb-sm border border-white/5 shadow-inner">
<span class="material-symbols-outlined text-primary-fixed" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
</div>
<h1 class="font-h2 text-h2 text-on-surface">Sign in to RankersKit</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Continue to your elite dashboard.</p>
</header>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-sm py-3 px-4 rounded-lg bg-surface-container border border-outline-variant/30 hover:bg-surface-container-high hover:border-outline-variant transition-all duration-300 group" type="button">
<svg class="w-5 h-5 text-on-surface group-hover:text-white transition-colors" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body-md text-body-md text-on-surface group-hover:text-white transition-colors">Continue with Google</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-sm">
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent to-outline-variant/50"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Or</span>
<div class="h-[1px] flex-1 bg-gradient-to-l from-transparent to-outline-variant/50"></div>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-md" method="POST">
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant/50 group-focus-within:text-primary-container transition-colors ml-xs">mail</span>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/50 pl-8 pr-0 py-3 text-on-surface font-body-md text-body-md focus:ring-0 focus:border-primary-container focus:outline-none transition-all placeholder:text-on-surface-variant/30" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<a class="font-label-caps text-label-caps text-primary hover:text-primary-fixed transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant/50 group-focus-within:text-primary-container transition-colors ml-xs">lock</span>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/50 pl-8 pr-0 py-3 text-on-surface font-body-md text-body-md focus:ring-0 focus:border-primary-container focus:outline-none transition-all placeholder:text-on-surface-variant/30" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<button class="mt-sm w-full py-4 rounded-lg bg-primary-container text-on-primary-container font-h2 text-h2 !text-[16px] flex items-center justify-center gap-2 hover:bg-primary-fixed hover:shadow-[0_0_20px_rgba(75,142,255,0.3)] transition-all duration-300 group relative overflow-hidden" type="submit">
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700 ease-in-out"></div>
<span class="relative z-10">Sign In</span>
<span class="material-symbols-outlined relative z-10 text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer link -->
<p class="text-center font-body-md text-body-md text-on-surface-variant mt-xs">
            Don't have an account? <a class="text-primary hover:text-primary-fixed transition-colors underline underline-offset-4 decoration-primary/30" href="#">Apply for access</a>
</p>
</main>
</body></html>
